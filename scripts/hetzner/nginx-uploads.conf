# Janička Shop — nginx snippet for serving images from local disk.
#
# Drop this into the existing janicka-shop server { } block (Phase 1 vhost
# at /etc/nginx/sites-available/janicka-shop.conf). Place it BEFORE the
# generic `location / { proxy_pass http://127.0.0.1:3000; }` block so it
# short-circuits image requests away from Next.js.
#
# Phase 3 layout:
#   /opt/janicka-shop-images/<key>   ← canonical store, populated by
#                                       one-time R2→disk pull (see runbook
#                                       step "Image migration"). After that,
#                                       admin uploads land here directly.
#   https://janicka-shop.cz/uploads/<key>  ← served by THIS block
#
# Cache-Control: 1 year immutable. Filenames are content-addressed (R2 key
# format = hash + ext) so they never need to change. ETag is on by default.
# add_header is repeated under expires for nginx<1.21 compatibility.
#
# Hardening: only GET/HEAD; reject any path traversal; disable autoindex;
# block dotfiles; bound the served file types so a bug uploading .php or
# .html into the dir cannot get executed via the public URL.

location /uploads/ {
    alias /opt/janicka-shop-images/;

    # Allowed methods only.
    limit_except GET HEAD {
        deny all;
    }

    # Block dotfiles + path traversal artefacts.
    location ~ /\. {
        deny all;
    }

    # Only image MIME types (and webp/avif). Anything else 404s.
    location ~* \.(jpe?g|png|gif|webp|avif|svg)$ {
        alias /opt/janicka-shop-images/;
        try_files $uri =404;

        # Long-lived immutable cache. Content-addressed keys never collide.
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept" always;

        # ETag is generated by nginx for static files by default; leave on.
        etag on;

        # Compression: webp/avif/jpeg/png are already compressed — skip gzip.
        gzip off;

        # Direct sendfile for throughput.
        sendfile on;
        tcp_nopush on;

        access_log off;
    }

    # Fallthrough — anything that isn't an allowed image extension.
    return 404;
}
