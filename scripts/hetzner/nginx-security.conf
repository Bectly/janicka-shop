# /etc/nginx/snippets/janicka-security.conf
#
# Phase 5 hardening snippet. Included from server { listen 443 ssl } block
# in /etc/nginx/sites-available/janicka-shop.conf via:
#
#     include snippets/janicka-security.conf;
#
# This snippet is the network-level baseline; per-route exceptions go in the
# vhost itself (e.g. Comgate iframe needs frame-src override on /checkout).
#
# Source of grades: TLS config matches Mozilla "intermediate" profile,
# headers target securityheaders.com grade A. HSTS preload submission is
# manual (see runbook § 6).

# ── TLS ──────────────────────────────────────────────────────────────────
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;
ssl_session_tickets off;

# OCSP stapling — tells browsers cert is still valid without a separate CRL fetch
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ── HSTS ─────────────────────────────────────────────────────────────────
# 2 years + includeSubDomains + preload. ONLY submit to hstspreload.org
# after Phase 4 DNS has been stable for >=7 days. Removal is weeks.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ── Defence-in-depth headers ─────────────────────────────────────────────
add_header X-Frame-Options                "SAMEORIGIN"          always;
add_header X-Content-Type-Options         "nosniff"             always;
add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
add_header Permissions-Policy             "camera=(), microphone=(), geolocation=(self), payment=(self), accelerometer=(), gyroscope=()" always;
add_header Cross-Origin-Opener-Policy     "same-origin"         always;
add_header X-XSS-Protection               "0"                   always;

# ── Content-Security-Policy ──────────────────────────────────────────────
# Notes:
# - 'unsafe-inline' on script-src is needed by Next.js hydration; nonce-based
#   CSP is a future migration (requires app changes). 'unsafe-eval' supports
#   the React dev runtime + a couple of analytics libs.
# - frame-src includes Comgate (PSP iframe) — janicka uses Comgate inline gate.
# - img-src allows R2 (production images), data: (Next.js base64 placeholders),
#   blob: (admin upload preview).
# - connect-src includes Vercel Insights for the period the site still posts
#   to Vercel; remove that origin once Speed Insights is detached.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.vercel-insights.com https://va.vercel-scripts.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.r2.dev https://imagedelivery.net; font-src 'self' data:; connect-src 'self' https://*.vercel-insights.com https://api.comgate.cz https://api.packeta.com; frame-src 'self' https://payments.comgate.cz; object-src 'none'; base-uri 'self'; form-action 'self' https://payments.comgate.cz; frame-ancestors 'self'; upgrade-insecure-requests" always;

# ── Hide nginx version ────────────────────────────────────────────────────
server_tokens off;

# ── Block common probe paths ──────────────────────────────────────────────
# fail2ban's nginx-noscript jail watches access logs for these patterns;
# nginx itself returns 444 (close without response) so the bot wastes time.
location ~* \.(php|asp|aspx|jsp|cgi|exe|env|git)$ {
    return 444;
}
location ~ /\.(?!well-known) {
    return 444;
}
