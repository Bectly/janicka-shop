# /etc/nginx/sites-available/janicka-shop.conf
#
# Reverse proxy for janicka-shop Next.js 16 app (PM2 cluster on 127.0.0.1:3000).
# Phase 2.1 of Hetzner migration (devloop_tasks #328).
#
# Pre-SSL: this block listens only on :80 for initial bring-up and certbot HTTP-01
# challenge. Certbot (#329 / P2.2) will add the :443 block, SSL directives, and
# the :80 -> :443 redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name janicka-shop.cz www.janicka-shop.cz;

    # Upload ceiling for product images (UploadThing / R2 route handlers accept up
    # to 10 files * 4MB + overhead).
    client_max_body_size 20M;

    # Per-location gzip (global gzip on in nginx.conf, types restricted here).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Proxy buffers sized for Next.js RSC payloads.
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Next.js static assets — long cache, bypass app for speed.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 302 365d;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # App router handles everything else.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / HMR upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard forwarding headers (Next.js reads X-Forwarded-* for absolute URLs).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Reasonable timeouts — long enough for slow Server Actions, short enough to
        # surface stalled upstream quickly.
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Certbot will insert /.well-known/acme-challenge/ and :443 block here.
}
